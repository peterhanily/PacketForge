name: CI

# The gate isn't just unit tests — it's real Zeek + tshark over freshly rendered
# captures, so "consistent with the logs" is checked on every change.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]   # 3.9 is the declared floor — test it, don't assume it
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tshark + Zeek + Suricata
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y tshark suricata
          echo 'deb http://download.opensuse.org/repositories/security:/zeek/xUbuntu_22.04/ /' \
            | sudo tee /etc/apt/sources.list.d/zeek.list
          curl -fsSL https://download.opensuse.org/repositories/security:zeek/xUbuntu_22.04/Release.key \
            | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/zeek.gpg >/dev/null
          sudo apt-get update
          sudo apt-get install -y zeek
          echo "/opt/zeek/bin" >> "$GITHUB_PATH"

      - name: Tool versions (fail fast if broken)
        run: |
          zeek --version
          tshark --version | head -1
          suricata --build-info | head -1

      - name: Install PacketForge + deps
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,realism]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Tests (unit + real-Zeek round-trip)
        run: PYTHONPATH=src python -m pytest -q

      - name: Smoke — render + validate against real Zeek
        run: |
          PYTHONPATH=src python -m packetforge scenario --env office --attack -o /tmp/ci.pcap
          PYTHONPATH=src python -m packetforge validate flows/c2_beacon.yaml
          PYTHONPATH=src python -m packetforge eval /tmp/ci.pcap
